    container_name: auberge-c17
    ports:
      - "127.0.0.1:4117:3000"
    volumes:
      - ./chapitres/17-perroquet-prompt-injection/app:/app
      - /app/node_modules
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 128
    networks:
      - auberge-net
    restart: "no"

  # --------------------------------------------------------------
  # Chapitre 13 : l'Atelier (deserialisation non sure) - SALLE A RISQUE
  # Durcissement maximal : la deserialisation peut mener a l'execution de code.
  # --------------------------------------------------------------
  c13-deserialisation:
    build: ./chapitres/13-atelier-deserialisation
    container_name: auberge-c13
    ports:
      - "127.0.0.1:4113:3000"
    volumes:
      - ./chapitres/13-atelier-deserialisation/app:/app
      - /app/node_modules
    user: "node"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 128m
    cpus: "0.25"
    pids_limit: 64
    networks:
      - auberge-net
    restart: "no"

  # --------------------------------------------------------------
  # Chapitre 14 : le Parchemin Scelle (XXE)
  # Lecture de fichier : aucun dossier sensible de l'hote n'est monte.
  # --------------------------------------------------------------
  c14-xxe-parchemin:
    build: ./chapitres/14-parchemin-xxe
    container_name: auberge-c14
    ports:
      - "127.0.0.1:4114:3000"
    volumes:
      - ./chapitres/14-parchemin-xxe/app:/app
      - /app/node_modules
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 128
    networks:
      - auberge-net
    restart: "no"

  # ================================================================
  # GABARIT pour les chapitres A RISQUE (command injection, SSTI, code injection).
  # A copier-coller et adapter : durcissement maximal. Le conteneur devient
  # une boite hermetique dont une attaque reussie ne peut pas sortir.
  # ================================================================
  #
  # cXX-command-injection:
  #   build: ./chapitres/XX-...
  #   container_name: auberge-cXX
  #   ports:
  #     - "127.0.0.1:41XX:3000"
  #   user: "node"                   # jamais root
  #   read_only: true                # systeme de fichiers en lecture seule
  #   tmpfs:
  #     - /tmp                        # seule zone ecrivable, videe a l'arret
  #   cap_drop:
  #     - ALL
  #   security_opt:
  #     - "no-new-privileges:true"
  #   mem_limit: 128m
  #   cpus: "0.25"
  #   pids_limit: 64                 # coupe court aux fork bombs
  #   networks:
  #     - auberge-isole             # voir reseau "internal" plus bas
  #   restart: "no"
  #
  #   # INTERDITS ABSOLUS dans ce projet :
  #   #  - ne JAMAIS monter /var/run/docker.sock (ce serait une evasion de conteneur)
  #   #  - ne JAMAIS monter un dossier sensible de l'hote
  #   # Le faux "secret" a exfiltrer doit vivre DANS le conteneur (ex: /app/tresor.txt).

networks:
  auberge-net:
    driver: bridge

  # Reseau pour les chapitres a risque : coupe d'Internet.
  # Note : selon ta version de Docker, verifie que la publication de port
  # (127.0.0.1:...) fonctionne bien avec un reseau "internal". Sinon, garde
  # le reseau standard ci-dessus : les autres protections (non-root, cap_drop,
  # read_only, limites) suffisent deja a contenir une attaque.
  auberge-isole:
    driver: bridge
    internal: true
