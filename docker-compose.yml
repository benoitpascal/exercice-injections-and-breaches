    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 128
    networks:
      - auberge-net
    restart: "no"

  # --------------------------------------------------------------
  # Chapitre 7 : le Vestiaire (mass assignment)
  # --------------------------------------------------------------
  c07-mass-assignment:
