      - /app/node_modules
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 128
    networks:
      - auberge-net
    restart: "no"

  # --------------------------------------------------------------
  # Chapitre 6 : le Grand Livre (injection NoSQL, moteur en memoire)
  # --------------------------------------------------------------
  c06-nosqli-grand-livre:
    build: ./chapitres/06-grand-livre-nosqli
    container_name: auberge-c06
    ports:
      - "127.0.0.1:4106:3000"
    volumes:
