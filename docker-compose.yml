# L'Auberge du Pixel - orchestration des chapitres.
# Chaque faille tourne dans son propre conteneur jetable.
#
# Regle d'or de surete : si quelque chose casse ou se comporte mal,
#   docker compose down && docker compose up --build
# remet la salle concernee a neuf. Une attaque reussie reste prisonniere
# du conteneur, elle ne touche pas ta machine.

services:

  # --------------------------------------------------------------
  # Chapitre 1 : Livre d'Or (XSS stocke)
  # Faille cote navigateur, aucun risque pour l'hote. Durcissement standard.
  # --------------------------------------------------------------
  c01-xss-livre-dor:
    build: ./chapitres/01-livre-dor-xss-stocke
    container_name: auberge-c01
    ports:
      - "127.0.0.1:4101:3000"        # accessible UNIQUEMENT depuis ta machine
    volumes:
      - ./chapitres/01-livre-dor-xss-stocke/app:/app   # tu edites le code depuis l'hote (acte 4)
      - /app/node_modules                              # preserve les dependances installees dans l'image
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 128
    networks:
      - auberge-net
    restart: "no"

  # --------------------------------------------------------------
  # Chapitre 2 : Tableau d'Affichage (XSS reflechi)
  # Faille cote navigateur, aucun risque pour l'hote. Durcissement standard.
  # --------------------------------------------------------------
  c02-xss-tableau:
    build: ./chapitres/02-tableau-affichage-xss-reflechi
    container_name: auberge-c02
    ports:
      - "127.0.0.1:4102:3000"
    volumes:
      - ./chapitres/02-tableau-affichage-xss-reflechi/app:/app
      - /app/node_modules
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 128
    networks:
      - auberge-net
    restart: "no"

  # --------------------------------------------------------------
  # Chapitre 3 : Les Coffres (IDOR)
  # --------------------------------------------------------------
  c03-idor-coffres:
    build: ./chapitres/03-coffres-idor
    container_name: auberge-c03
    ports:
      - "127.0.0.1:4103:3000"
    volumes:
      - ./chapitres/03-coffres-idor/app:/app
      - /app/node_modules
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 128
    networks:
      - auberge-net
    restart: "no"

  # --------------------------------------------------------------
  # Chapitre 4 : La Reserve (path traversal)
  # Faille de lecture de fichier : le conteneur ne monte AUCUN dossier
  # sensible de l'hote, donc une traversee reste limitee a la boite.
  # --------------------------------------------------------------
  c04-path-traversal:
    build: ./chapitres/04-reserve-path-traversal
    container_name: auberge-c04
    ports:
      - "127.0.0.1:4104:3000"
    volumes:
      - ./chapitres/04-reserve-path-traversal/app:/app
      - /app/node_modules
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 128
    networks:
      - auberge-net
    restart: "no"

  # --------------------------------------------------------------
  # Chapitre 5 : le Registre (injection SQL, base SQLite embarquee)
  # --------------------------------------------------------------
  c05-sqli-registre:
    build: ./chapitres/05-registre-sqli
