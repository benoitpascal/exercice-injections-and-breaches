      - /app/node_modules
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 128
    networks:
      - auberge-net
    restart: "no"

  # --------------------------------------------------------------
  # Chapitre 8 : le Panneau Indicateur (open redirect)
  # --------------------------------------------------------------
  c08-open-redirect:
    build: ./chapitres/08-panneau-open-redirect
    container_name: auberge-c08
    ports:
      - "127.0.0.1:4108:3000"
    volumes:
      - ./chapitres/08-panneau-open-redirect/app:/app
      - /app/node_modules
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 128
    networks:
      - auberge-net
    restart: "no"

  # --------------------------------------------------------------
  # Chapitre 9 : la Sonnette (CSRF)
  # --------------------------------------------------------------
  c09-csrf-sonnette:
    build: ./chapitres/09-sonnette-csrf
    container_name: auberge-c09
    ports:
      - "127.0.0.1:4109:3000"
    volumes:
      - ./chapitres/09-sonnette-csrf/app:/app
      - /app/node_modules
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 128
    networks:
      - auberge-net
    restart: "no"

  # --------------------------------------------------------------
  # Chapitre 10 : le Pigeon Voyageur (SSRF)
  # Le service interne (port 9000) tourne DANS le conteneur et n'est pas publie :
  # seul le serveur public peut l'atteindre, c'est tout l'interet du chapitre.
  # --------------------------------------------------------------
  c10-ssrf-pigeon:
    build: ./chapitres/10-pigeon-ssrf
    container_name: auberge-c10
    ports:
      - "127.0.0.1:4110:3000"
    volumes:
      - ./chapitres/10-pigeon-ssrf/app:/app
      - /app/node_modules
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 128
    networks:
      - auberge-net
    restart: "no"

  # --------------------------------------------------------------
  # Chapitre 11 : les Cuisines (command injection) - SALLE A RISQUE
  # Durcissement maximal : meme une execution de commande reste enfermee ici.
  # --------------------------------------------------------------
  c11-command-injection:
    build: ./chapitres/11-cuisines-command-injection
    container_name: auberge-c11
    ports:
      - "127.0.0.1:4111:3000"
    volumes:
      - ./chapitres/11-cuisines-command-injection/app:/app
      - /app/node_modules
    user: "node"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 128m
    cpus: "0.25"
    pids_limit: 64
    networks:
      - auberge-net
    restart: "no"

  # --------------------------------------------------------------
  # Chapitre 12 : le Menu du Jour (SSTI) - SALLE A RISQUE
  # Meme durcissement : une SSTI peut mener a l'execution de code.
  # --------------------------------------------------------------
  c12-ssti-menu:
    build: ./chapitres/12-menu-ssti
    container_name: auberge-c12
    ports:
      - "127.0.0.1:4112:3000"
    volumes:
      - ./chapitres/12-menu-ssti/app:/app
      - /app/node_modules
    user: "node"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    mem_limit: 128m
    cpus: "0.25"
    pids_limit: 64
    networks:
      - auberge-net
    restart: "no"

  # --------------------------------------------------------------
  # Chapitre 15 : le Portier (injection LDAP)
  # --------------------------------------------------------------
  c15-ldap-portier:
    build: ./chapitres/15-portier-ldap
    container_name: auberge-c15
    ports:
      - "127.0.0.1:4115:3000"
    volumes:
      - ./chapitres/15-portier-ldap/app:/app
      - /app/node_modules
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
